# sandboxes/sandcastle-orchestration/tests/qa.golden.yaml — fold_in_sandbox_gate qa tier fixture.
# BOW-cosine (deterministic, no Ollama) scores each query against THIS sandbox's SKILL.md routing surface
# (frontmatter description + when_to_use + triggers ONLY — body not scored); actual = trigger if cosine >
# min_score else no_trigger. regression green iff every actual == expected_current (PG-214 behavioral-golden).
# expected_current = MEASURED baseline — filled from an actual `--tier qa` run, NEVER predicted.
schema: sandbox-qa-golden/v1
min_score: 0.05
cases:
