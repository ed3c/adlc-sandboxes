# sandboxes/self-correcting-loop/tests/qa.golden.yaml — fold_in_sandbox_gate qa tier fixture.
# BOW-cosine (deterministic, no Ollama) scores each query against THIS sandbox's SKILL.md routing
# surface; actual = trigger if cosine > min_score else no_trigger. regression green iff every
# actual == expected_current (PG-214 behavioral-golden). expected_current = MEASURED baseline (filled
# after a real qa run, never predicted).
schema: sandbox-qa-golden/v1
min_score: 0.05
cases:
  # should-trigger: queries sharing real tokens with the DECIDE-gate routing surface
  - id: QA-01
    query: "run a self-correcting loop and decide FINAL or ITERATING against a rubric"
    ground_truth: trigger
    expected_current: trigger
  - id: QA-02
    query: "rubric gate: is every criterion above its threshold or keep iterating, give the weakest focus"
    ground_truth: trigger
    expected_current: trigger
  - id: QA-03
    query: "PLAN DO VERIFY DECIDE 自我修正迴圈 迭代收斂"
    ground_truth: trigger
    expected_current: trigger
  # should-not-trigger: adjacent-domain queries that must route to NEIGHBOR sandboxes, not here
  - id: QA-04
    query: "launch the openshell containment sandbox with default-deny egress isolation"
    ground_truth: no_trigger
    expected_current: no_trigger
  - id: QA-05
    query: "index documents into the local vector store for air-gapped retrieval"
    ground_truth: no_trigger
    expected_current: no_trigger
